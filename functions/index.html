<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 종목 스캔 V2 - 실전 단타 코어</title>
    <style>
        :root {
            --bg-color: #090d16;
            --card-bg: #121b2d;
            --inner-bg: #1a263f;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --accent-up: #f43f5e;
            --accent-down: #3b82f6;
            --ai-gold: #f59e0b;
            --neon-green: #10b981;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 540px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        .header h1 { font-size: 18px; margin: 0; }
        .timer { font-size: 13px; color: var(--ai-gold); font-weight: bold; }
        
        .stock-list { display: flex; flex-direction: column; gap: 16px; }
        .stock-item {
            background: rgba(30, 41, 59, 0.4);
            border-radius: 12px;
            border: 1px solid #1e293b;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .stock-main-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stock-title { display: flex; align-items: center; gap: 8px; }
        .rank { font-weight: bold; color: var(--ai-gold); }
        .name { font-weight: bold; font-size: 15px; }
        
        /* 🏅 오늘 단타 칠 수 있는 상태인지 알려주는 배지 */
        .suitability {
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .suit-ok { background: rgba(16, 185, 129, 0.2); color: var(--neon-green); }
        .suit-no { background: rgba(100, 116, 139, 0.2); color: var(--text-muted); }

        .price-info { text-align: right; }
        .price { font-weight: bold; font-size: 15px; margin-right: 6px; }
        .change { font-size: 12px; font-weight: bold; }
        .up { color: var(--accent-up); }
        .down { color: var(--accent-down); }

        /* 📊 거래량 / 체결강도 전용 스펙 데이터 보드 */
        .volume-board {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
        }
        .vol-item span:first-child { color: var(--text-muted); margin-right: 4px; }
        .vol-item span:last-child { font-weight: bold; color: #e2e8f0; }

        /* 🎯 매수/매도/지지선 타점 그리드 */
        .target-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            background: var(--inner-bg);
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-size: 11.5px;
        }
        .target-box { display: flex; flex-direction: column; }
        .target-lbl { color: #94a3b8; font-size: 10.5px; margin-bottom: 2px; }
        .target-v { font-weight: bold; }
        .v-buy { color: var(--neon-green); }
        .v-sell { color: var(--accent-up); }
        .v-sup { color: #60a5fa; }

        /* 💡 왜 사야 하는지 핵심 단타 근거 브리핑 */
        .reason-box {
            font-size: 12px;
            background: rgba(245, 158, 11, 0.04);
            border-left: 3px solid var(--ai-gold);
            padding: 8px 10px;
            border-radius: 4px;
            line-height: 1.5;
            color: #cbd5e1;
        }
        .reason-lbl { font-weight: bold; color: var(--ai-gold); margin-bottom: 2px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📈 실시간 종목 스캔 V2</h1>
        <div class="timer" id="timer">🔄 30초 뒤 갱신</div>
    </div>

    <div class="stock-list" id="stockList">
        <!-- 자바스크립트가 개별 타점 리포트 주입 -->
    </div>
</div>

<script>
    let countdown = 30;
    const timerEl = document.getElementById('timer');

    setInterval(() => {
        countdown--;
        if (countdown < 0) countdown = 30;
        timerEl.innerText = `🔄 ${countdown}초 뒤 갱신`;
    }, 1000);

    async function fetchScanData() {
        try {
            const res = await fetch('/.netlify/functions/scan');
            const data = await res.json();
            
            if (data.success) {
                const listEl = document.getElementById('stockList');
                listEl.innerHTML = '';
                
                data.top10.forEach((item, index) => {
                    const isUp = item.change && !item.change.includes('-');
                    const changeClass = isUp ? 'up' : 'down';
                    
                    // 단타 칠 수 있는지 상태 배지 분기
                    const suitClass = item.isSuitable ? 'suit-ok' : 'suit-no';
                    const suitText = item.isSuitable ? '⚡ 단타 타점 유효' : '💤 관망/수급 대기';

                    listEl.innerHTML += `
                        <div class="stock-item">
                            <!-- [1] 상단: 이름 및 변동률, 단타 판단 배지 -->
                            <div class="stock-main-info">
                                <div class="stock-title">
                                    <span class="rank">#${index + 1}</span>
                                    <span class="name">${item.name}</span>
                                    <span class="suitability ${suitClass}">${suitText}</span>
                                </div>
                                <div class="price-info">
                                    <span class="price">${item.price}</span>
                                    <span class="change ${changeClass}">${item.change}</span>
                                </div>
                            </div>
                            
                            <!-- [2] 중단: 거래량 및 실시간 체결강도 정보 -->
                            <div class="volume-board">
                                <div class="vol-item"><span>📈 거래량:</span><span>${item.volume}</span></div>
                                <div class="vol-item"><span>⚡ 체결강도:</span><span style="color:${parseFloat(item.volumePower) >= 100 ? '#f43f5e':'#3b82f6'}">${item.volumePower}%</span></div>
                            </div>
                            
                            <!-- [3] 중단: 가이드 타점 -->
                            <div class="target-grid">
                                <div class="target-box"><span class="target-lbl">🎯 매수진입가</span><span class="target-v v-buy">${item.targets.buy}</span></div>
                                <div class="target-box"><span class="target-lbl">🛑 목표익절가</span><span class="target-v v-sell">${item.targets.sell}</span></div>
                                <div class="target-box"><span class="target-lbl">⚓ 손절선/지지</span><span class="target-v v-sup">${item.targets.support}</span></div>
                            </div>

                            <!-- [4] 하단: 🔥 핵심 수급근거 (왜 사야 하는가?) -->
                            <div class="reason-box">
                                <span class="reason-lbl">📝 실전 단타 분석 근거:</span>
                                ${item.whyBuyReason}
                            </div>
                        </div>
                    `;
                });
            }
        } catch (err) {
            console.error(err);
        }
    }

    fetchScanData();
    setInterval(fetchScanData, 30500);
</script>

</body>
</html>
