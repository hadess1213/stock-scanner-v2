<table id="stock-table">
    <thead>
        <tr>
            <th>종목</th>
            <th>현재가</th>
        </tr>
    </thead>
    <tbody id="stock-body">
        </tbody>
</table>

<script>
    fetch('https://stock-scanner-v2-zwzk.vercel.app/api/scan')
        .then(response => response.json())
        .then(data => {
            const tbody = document.getElementById('stock-body');
            // 받아온 데이터를 테이블 행으로 추가
            tbody.innerHTML = `
                <tr>
                    <td>Apple (AAPL)</td>
                    <td>$${data.price}</td>
                </tr>
            `;
        });
</script>
