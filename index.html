<!DOCTYPE html>
<html>
<head>
    <style>
        /* 위에서 만든 CSS 스타일 */
    </style>
</head>
<body>

    <table id="stock-table">
        <thead>
            <tr>
                <th>종목</th>
                <th>현재가</th>
            </tr>
        </thead>
        <tbody id="stock-body">
            </tbody>
    </table>

    <script>
        // API 호출
        fetch('https://stock-scanner-v2-zwzk.vercel.app/api/scan')
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('stock-body');
                if(tbody) {
                    tbody.innerHTML = `<tr><td>Apple (AAPL)</td><td>$${data.price}</td></tr>`;
                }
            })
            .catch(err => console.error(err));
    </script>
</body>
</html>
