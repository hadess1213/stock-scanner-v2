<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 종목 스캔 V2 - 타점 매니저</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --inner-bg: #1e2d4a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-up: #f43f5e;   /* 강렬한 매수 빨강 */
            --accent-down: #3b82f6; /* 하락 파랑 */
            --ai-gold: #f59e0b;
            --neon-green: #10b981;  /* 매수 타점 색상 */
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 520px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #24334d;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 20px; margin: 0; }
        .timer { font-size: 14px; color: var(--ai-gold); font-weight: bold; }
        
        .section-title { font-size: 16px; color: var(--text-muted); margin-bottom: 16px; font-weight: bold; }
        
        .stock-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
        .stock-item {
            background: rgba(255,255,255,0.01);
            border-radius: 14px;
            border: 1px solid #24334d;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .stock-main-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .stock-info { display: flex; align-items: center; gap: 12px; }
        .rank { font-weight: bold; color: var(--ai-gold); font-size: 16px; }
        .name { font-weight: bold; font-size: 16px; }
        
        .stock-meta { text-align: right; }
        .price-row { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
        .price { font-weight: bold; font-size: 16px; }
        .change { font-size: 13px; font-weight: bold; padding: 2px 6px; border-radius: 4px; background: rgba(0,0,0,0.2); }
        .up { color: var(--accent-up); }
        .down { color: var(--accent-down); }
        
        /* 🔥 실전 단타 타점 가이드 보드 스타일 */
        .tardget-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: var(--inner-bg);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
        }
        .target-box { display: flex; flex-direction: column; gap: 4px; }
        .target-label { color: var(--text-muted); font-size: 11px; }
        .target-val { font-weight: bold; font-size: 13px; }
        .val-buy { color: var(--neon-green); }
        .val-sell { color: var(--accent-up); }
        .val-support { color: #60a5fa; }

        /* 💬 종목별 한줄 평 멘트 스타일 */
        .stock-comment {
            font-size: 12.5px;
            color: #cbd5e1;
            background: rgba(255,255,255,0.03);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid var(--ai-gold);
            line-height: 1.4;
        }

        .condition-box {
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 14px;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cond-item { display: flex; justify-content: space-between; color: var(--text-muted); }
        .cond-item span:last-child { color: var(--text-main); font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📈 실시간 종목 스캔 V2</h1>
        <div class="timer" id="timer">🔄 30초 뒤 갱신</div>
    </div>

    <div class="section-title">🔥 실시간 글로벌 단타 레이더 (개별 타점 가이드)</div>
    <div class="stock-list" id="stockList">
        </div>

    <div class="condition-box">
        <div class="cond-item"><span>🚀 급등주 검색 조건</span><span>상승률 +3% 이상 거래량 증가</span></div>
        <div class="cond-item"><span>💎 눌림목 검색 조건</span><span>전고점 돌파 후 -2% ~ -5% 조정</span></div>
    </div>
</div>

<script>
    let countdown = 30;
    const timerEl = document.getElementById('timer');

    setInterval(() => {
        countdown--;
        if (countdown < 0) countdown = 30;
        timerEl.innerText = `🔄 ${countdown}초 뒤 갱신`;
    }, 1000);

    async function fetchScanData() {
        try {
            const res = await fetch('/.netlify/functions/scan');
            const data = await res.json();
            
            if (data.success) {
                const listEl = document.getElementById('stockList');
                listEl.innerHTML = '';
                
                data.top10.forEach((item, index) => {
                    const isUp = item.change && !item.change.includes('-');
                    const changeClass = isUp ? 'up' : 'down';

                    listEl.innerHTML += `
                        <div class="stock-item">
                            <div class="stock-main-info">
                                <div class="stock-info">
                                    <span class="rank">${index + 1}</span>
                                    <span class="name">${item.name}</span>
                                </div>
                                <div class="stock-meta">
                                    <div class="price-row">
                                        <span class="price">${item.price}</span>
                                        <span class="change ${changeClass}">${item.change || ''}</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="tardget-board">
                                <div class="target-box">
                                    <span class="target-label">🎯 매수 권장가</span>
                                    <span class="target-val val-buy">${item.targets.buy}</span>
                                </div>
                                <div class="target-box">
                                    <span class="target-label">🛑 익절 목표가</span>
                                    <span class="target-val val-sell">${item.targets.sell}</span>
                                </div>
                                <div class="target-box">
                                    <span class="target-label">⚓ 핵심 지지선</span>
                                    <span class="target-val val-support">${item.targets.support}</span>
                                </div>
                            </div>

                            <div class="stock-comment">
                                💡 ${item.comment}
                            </div>
                        </div>
                    `;
                });
            }
        } catch (err) {
            console.error("데이터 연동 오류:", err);
        }
    }

    fetchScanData();
    setInterval(fetchScanData, 30500);
</script>

</body>
</html>
